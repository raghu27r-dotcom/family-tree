<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Chozhagar Family Tree</title>
    <style>
        /* --- FIX: Background Glitch --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 0;
            min-height: 100vh;
            /* Remove background from here to prevent mobile jitter */
            background-color: #222; 
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bgk.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1; /* Keeps it behind everything */
            will-change: transform; /* Helps mobile performance */
        }

        h1 {
            display: block;
            width: fit-content;
            margin: 0 auto 50px auto;
            color: #000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 1.5rem;
            text-align: center;
        }

        /* --- FIX: Tree Centering --- */
        .tree-outer {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            text-align: center; /* Ensures the inline-block tree centers */
        }

        .tree {
            display: inline-block;
            padding: 20px;
            min-width: 100%; /* Forces centering when tree is smaller than screen */
        }

        .tree ul {
            padding-top: 20px; 
            position: relative;
            display: flex;
            justify-content: center;
            padding-left: 0;
            margin: 0;
        }

        .tree li {
            list-style-type: none;
            position: relative;
            padding: 20px 5px 0 5px;
            transition: all 0.5s;
        }

        /* --- CONNECTOR LINES --- */
        .tree li::before, .tree li::after {
            content: '';
            position: absolute; 
            top: 0; 
            right: 50%;
            border-top: 2px solid #3498db;
            width: 50%; 
            height: 20px;
        }
        .tree li::after {
            right: auto; 
            left: 50%;
            border-left: 2px solid #3498db;
        }

        .tree li:only-child::after, .tree li:only-child::before {
            display: none;
        }
        .tree li:only-child { padding-top: 0; }

        .tree li:first-child::before, .tree li:last-child::after {
            border: 0 none;
        }
        .tree li:last-child::before {
            border-right: 2px solid #3498db;
            border-radius: 0 5px 0 0;
        }
        .tree li:first-child::after {
            border-radius: 5px 0 0 0;
        }

        .tree ul ul::before {
            content: '';
            position: absolute; 
            top: 0; 
            left: 50%;
            border-left: 2px solid #3498db;
            width: 0; 
            height: 20px;
        }

        /* --- MEMBER CARDS --- */
        .member-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
            width: 150px; /* Consistent width helps centering */
            white-space: normal;
            transition: 0.3s;
        }
        
        .member-card img {
            width: 120px; 
            height: 120px; 
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .name { 
            font-weight: bold; 
            font-size: 14px; 
            color: #ffffff; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* --- MODAL --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
        }
        .modal-content {
            background: rgba(40, 40, 40, 0.9);
            backdrop-filter: blur(15px);
            margin: 20% auto;
            padding: 20px;
            width: 80%;
            max-width: 300px;
            border-radius: 20px;
            color: white;
            text-align: center;
        }
        .close-btn { float: right; cursor: pointer; font-size: 24px; }
        #modal-img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #3498db; margin-bottom: 10px;}
    </style>
</head>
<body>

    <h1>The Chozhagar Family Tree</h1>
    
    <div class="tree-outer">
        <div class="tree">
            <ul>
                <li>
                    <div class="member-card" data-name="Aylambal Annasamy Chozhagar" data-dob="Born: 1947" data-marr="Married: 1967" data-img="appaye.jpg">
                        <img src="appaye.jpg">
                        <div class="name">Aylambal Annasamy Chozhagar</div>
                    </div>
                    <ul>
                        <li>
                            <div class="member-card" data-name="Rajendran & Thangam" data-dob="DOB: 04/05/1968 & 11/10/1969" data-marr="Married: 12/06/1994" data-img="dadmom.jpg">
                                <img src="dadmom.jpg">
                                <div class="name">Rajendran & Thangam</div>
                            </div>
                            <ul>
                                <li>
                                    <div class="member-card" data-name="Raghu & Anu" data-dob="DOB: 15/04/1995 & 16/02/1996" data-marr="Married: 08/09/2024" data-img="raghu.jpg">
                                        <img src="raghu.jpg">
                                        <div class="name">Raghu & Anu</div>
                                    </div>
                                </li>
                                <li>
                                    <div class="member-card" data-name="Raja & Sanjeeya" data-dob="DOB: 11/01/1997 & 1997" data-marr="Married: 18/05/2025" data-img="raja.jpg">
                                        <img src="raja.jpg">
                                        <div class="name">Raja & Sanjeeya</div>
                                    </div>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-img" src="">
            <h3 id="modal-name-text"></h3>
            <p id="modal-dob-text"></p>
            <p id="modal-marr-text"></p>
        </div>
    </div>

    <script>
        const modal = document.getElementById("infoModal");

        document.querySelectorAll('.member-card').forEach(card => {
            card.addEventListener('click', function() {
                document.getElementById("modal-name-text").innerText = this.getAttribute("data-name");
                document.getElementById("modal-dob-text").innerText = this.getAttribute("data-dob");
                document.getElementById("modal-marr-text").innerText = this.getAttribute("data-marr");
                document.getElementById("modal-img").src = this.getAttribute("data-img");
                modal.style.display = "block";
            });
        });

        function closeModal() { modal.style.display = "none"; }
        window.onclick = (event) => { if (event.target == modal) closeModal(); }
    </script>

</body>
</html>
