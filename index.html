<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Chozhagar Family Tree</title>
    <style>
        /* --- Background Fix --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 0;
            min-height: 100vh;
            background-color: #222; 
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bgk.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            will-change: transform;
        }

        h1 {
            display: block;
            width: fit-content;
            margin: 0 auto 50px auto;
            color: #000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 1.5rem;
            text-align: center;
        }

        /* --- Tree Layout --- */
        .tree-outer {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            text-align: center;
        }

        .tree {
            display: inline-block;
            padding: 20px;
            min-width: 100%;
        }

        .tree ul {
            padding-top: 20px; 
            position: relative;
            display: flex;
            justify-content: center;
            padding-left: 0;
            margin: 0;
        }

        .tree li {
            list-style-type: none;
            position: relative;
            padding: 20px 5px 0 5px;
            transition: all 0.5s;
        }

        /* --- Connectors --- */
        .tree li::before, .tree li::after {
            content: '';
            position: absolute; 
            top: 0; right: 50%;
            border-top: 2px solid #3498db;
            width: 50%; height: 20px;
        }
        .tree li::after {
            right: auto; left: 50%;
            border-left: 2px solid #3498db;
        }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid #3498db; border-radius: 0 5px 0 0; }
        .tree li:first-child::after { border-radius: 5px 0 0 0; }
        .tree ul ul::before {
            content: '';
            position: absolute; top: 0; left: 50%;
            border-left: 2px solid #3498db;
            width: 0; height: 20px;
        }

        /* --- Member Cards --- */
        .member-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
            width: 150px;
            white-space: normal;
        }
        
        .member-card img {
            width: 120px; 
            height: 120px; 
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .name { 
            font-weight: bold; font-size: 14px; color: #ffffff; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* --- RESTORED GLASSY MODAL --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); /* Dim the background */
        }
        
        .modal-content {
            background: rgba(255, 255, 255, 0.15); /* Transparent white */
            backdrop-filter: blur(20px); /* Heavy blur for glass effect */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4); /* Bright glassy border */
            margin: 20vh auto;
            padding: 25px;
            width: 80%;
            max-width: 300px;
            border-radius: 25px;
            color: white;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: modalFadeIn 0.3s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-btn { 
            position: absolute;
            right: 15px;
            top: 10px;
            cursor: pointer; 
            font-size: 28px; 
            color: rgba(255, 255, 255, 0.8);
        }
        
        #modal-img { 
            width: 110px; height: 110px; 
            border-radius: 50%; 
            border: 3px solid #3498db; 
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #modal-name-text { margin-top: 0; font-size: 1.2rem; }
        .modal-details { font-size: 0.9rem; color: #e0e0e0; margin: 5px 0; }
    </style>
</head>
<body>

    <h1>The Chozhagar Family Tree</h1>
    
    <div class="tree-outer">
        <div class="tree">
            <ul>
                <li>
                    <div class="member-card" data-name="Aylambal Annasamy Chozhagar" data-dob="Born: 1947" data-marr="Married: 1967" data-img="appaye.jpg">
                        <img src="appaye.jpg">
                        <div class="name">Aylambal Annasamy Chozhagar</div>
                    </div>
                    <ul>
                        <li>
                            <div class="member-card" data-name="Rajendran & Thangam" data-dob="DOB: 04/05/1968 & 11/10/1969" data-marr="Married: 12/06/1994" data-img="dadmom.jpg">
                                <img src="dadmom.jpg">
                                <div class="name">Rajendran & Thangam</div>
                            </div>
                            <ul>
                                <li>
                                    <div class="member-card" data-name="Raghu & Anu" data-dob="DOB: 15/04/1995 & 16/02/1996" data-marr="Married: 08/09/2024" data-img="raghu.jpg">
                                        <img src="raghu.jpg">
                                        <div class="name">Raghu & Anu</div>
                                    </div>
                                </li>
                                <li>
                                    <div class="member-card" data-name="Raja & Sanjeeya" data-dob="DOB: 11/01/1997 & 1997" data-marr="Married: 18/05/2025" data-img="raja.jpg">
                                        <img src="raja.jpg">
                                        <div class="name">Raja & Sanjeeya</div>
                                    </div>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-img" src="">
            <h3 id="modal-name-text"></h3>
            <p id="modal-dob-text" class="modal-details"></p>
            <p id="modal-marr-text" class="modal-details"></p>
        </div>
    </div>

    <script>
        const modal = document.getElementById("infoModal");

        document.querySelectorAll('.member-card').forEach(card => {
            card.addEventListener('click', function() {
                document.getElementById("modal-name-text").innerText = this.getAttribute("data-name");
                document.getElementById("modal-dob-text").innerText = this.getAttribute("data-dob");
                document.getElementById("modal-marr-text").innerText = this.getAttribute("data-marr");
                document.getElementById("modal-img").src = this.getAttribute("data-img");
                modal.style.display = "block";
            });
        });

        function closeModal() { modal.style.display = "none"; }
        window.onclick = (event) => { if (event.target == modal) closeModal(); }
    </script>

</body>
</html>
