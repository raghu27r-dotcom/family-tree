<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Chozhagar Family Tree</title>
    <style>
        /* --- FIX 1: Prevent Background Bounce/Glitch --- */
        html, body {
            overscroll-behavior: none; 
            margin: 0;
            padding: 0;
            width: 100%;
        }

        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bgk.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0 60px 0;
            min-height: 100vh;
        }

        h1 {
            display: block;
            width: fit-content;
            margin: 20px auto 40px auto;
            color: #000;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 1.4rem;
            text-align: center;
        }

        /* --- FIX 2: Perfect Centering Logic --- */
        .tree-outer {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            text-align: center; /* This centers the inline-block child */
        }

        .tree {
            display: inline-block; /* Changed from table for better mobile flex compatibility */
            padding: 20px;
            min-width: 100%; /* Ensures it centers if small, scrolls if big */
            box-sizing: border-box;
        }

        .tree ul {
            padding-top: 20px; 
            position: relative;
            display: flex;
            justify-content: center;
            padding-left: 0 !important; /* CRITICAL: Remove browser default indentation */
            margin: 0;
        }

        .tree li {
            list-style-type: none;
            position: relative;
            padding: 20px 5px 0 5px;
        }

        /* --- Connectors --- */
        .tree li::before, .tree li::after {
            content: '';
            position: absolute; 
            top: 0; right: 50%;
            border-top: 2px solid #3498db;
            width: 50%; height: 20px;
        }
        .tree li::after {
            right: auto; left: 50%;
            border-left: 2px solid #3498db;
        }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree li:last-child::before { border-right: 2px solid #3498db; border-radius: 0 5px 0 0; }
        .tree li:first-child::after { border-radius: 5px 0 0 0; }
        .tree ul ul::before {
            content: '';
            position: absolute; top: 0; left: 50%;
            border-left: 2px solid #3498db;
            width: 0; height: 20px;
            transform: translateX(-50%); /* Ensures perfectly vertical line */
        }

        /* --- Member Cards --- */
        .member-card {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 12px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 10;
            width: 140px;
            transition: transform 0.2s;
            cursor: pointer;
        }
        
        .member-card img {
            width: 100px; 
            height: 100px; 
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 8px;
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        .name { 
            font-weight: bold; 
            font-size: 13px; 
            color: #ffffff; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            line-height: 1.2;
            word-wrap: break-word;
        }

        /* --- Modal Glassmorphism --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
        }
        
        .modal-content {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            margin: 15vh auto;
            padding: 30px 20px;
            width: 85%;
            max-width: 280px;
            border-radius: 25px;
            color: white;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .close-btn { 
            position: absolute;
            right: 15px; top: 10px;
            cursor: pointer; 
            font-size: 30px; 
            color: white;
            line-height: 1;
        }
        
        #modal-img { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            border: 3px solid #3498db; 
            margin-bottom: 15px;
        }

        .modal-details { font-size: 0.95rem; color: #f0f0f0; margin: 8px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <h1>The Chozhagar Family Tree</h1>
    
    <div class="tree-outer">
        <div class="tree">
            <ul>
                <li>
                    <div class="member-card" data-name="Aylambal Annasamy Chozhagar" data-dob="Born: 1947" data-marr="Married: 1967" data-img="appaye.jpg">
                        <img src="appaye.jpg">
                        <div class="name">Aylambal Annasamy Chozhagar</div>
                    </div>
                    <ul>
                        <li>
                            <div class="member-card" data-name="Rajendran & Thangam" data-dob="DOB: 04/05/1968 & 11/10/1969" data-marr="Married: 12/06/1994" data-img="dadmom.jpg">
                                <img src="dadmom.jpg">
                                <div class="name">Rajendran & Thangam</div>
                            </div>
                            <ul>
                                <li>
                                    <div class="member-card" data-name="Raghu & Anu" data-dob="DOB: 15/04/1995 & 16/02/1996" data-marr="Married: 08/09/2024" data-img="raghu.jpg">
                                        <img src="raghu.jpg">
                                        <div class="name">Raghu & Anu</div>
                                    </div>
                                </li>
                                <li>
                                    <div class="member-card" data-name="Raja & Sanjeeya" data-dob="DOB: 11/01/1997 & 1997" data-marr="Married: 18/05/2025" data-img="raja.jpg">
                                        <img src="raja.jpg">
                                        <div class="name">Raja & Sanjeeya</div>
                                    </div>
                                </li>
                            </ul>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-img" src="">
            <h3 id="modal-name-text" style="margin: 0 0 10px 0;"></h3>
            <p id="modal-dob-text" class="modal-details"></p>
            <p id="modal-marr-text" class="modal-details"></p>
        </div>
    </div>

    <script>
        const modal = document.getElementById("infoModal");

        document.querySelectorAll('.member-card').forEach(card => {
            card.addEventListener('click', function() {
                document.getElementById("modal-name-text").innerText = this.getAttribute("data-name");
                document.getElementById("modal-dob-text").innerText = this.getAttribute("data-dob");
                document.getElementById("modal-marr-text").innerText = this.getAttribute("data-marr");
                document.getElementById("modal-img").src = this.getAttribute("data-img");
                modal.style.display = "block";
            });
        });

        function closeModal() { modal.style.display = "none"; }
        window.onclick = (event) => { if (event.target == modal) closeModal(); }
    </script>

</body>
</html>
