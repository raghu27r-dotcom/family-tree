<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Chozhagar Family Tree</title>
    <style>
        body {
            font-family: sans-serif;
            background-image: url('bg.jpg');
            background-size: cover;    
            background-position: center;
            background-attachment: fixed; 
            margin: 0;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* --- TREE CONNECTOR LOGIC --- */
        .tree-container ul {
            padding-top: 20px; 
            position: relative;
            display: flex;
            justify-content: center;
            padding-left: 0;
        }

        .tree-container li {
            text-align: center;
            list-style-type: none;
            position: relative;
            padding: 20px 5px 0 5px;
        }

        /* Horizontal Lines - 3px Black */
        .tree-container li::before, .tree-container li::after {
            content: '';
            position: absolute;
            top: 0; 
            right: 50%;
            border-top: 3px solid #000;
            width: 50%; 
            height: 20px;
        }
        .tree-container li::after {
            right: auto; 
            left: 50%;
            border-left: 3px solid #000;
        }

        /* Logic for edges and single children */
        .tree-container li:only-child::after, .tree-container li:only-child::before {
            display: none;
        }
        .tree-container li:only-child { padding-top: 0; }
        
        .tree-container li:first-child::after { border-radius: 8px 0 0 0; }
        .tree-container li:last-child::before { border-right: 3px solid #000; border-radius: 0 8px 0 0; }
        .tree-container li:first-child::before, .tree-container li:last-child::after { border: 0 none; }

        /* Vertical Connector from Parent */
        .tree-container ul ul::before {
            content: '';
            position: absolute; 
            top: 0; 
            left: 50%;
            border-left: 3px solid #000;
            width: 0; 
            height: 20px;
        }

        /* --- PHOTO CARDS --- */
        .member-card {
            border: 2px solid #3498db;
            padding: 10px;
            background: white;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .member-card:hover { transform: scale(1.05); }
        
        .member-card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 8px auto;
            background: #eee;
        }

        .name { font-weight: bold; font-size: 14px; color: #2c3e50; }

        /* --- MODAL / POP-UP STYLES --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 25px;
            width: 300px;
            border-radius: 15px;
            text-align: center;
            position: relative;
        }
        .close-btn {
            position: absolute;
            right: 15px; top: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }
        #modal-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #3498db; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>The Chozhagar Family Tree</h1>
    
    <div class="tree-container">
        <ul>
            <li>
                <div class="member-card" data-name="Aylambal Annasamy Chozhagar" data-dob="Born: 1947" data-marr="Married: 1967" data-img="appaye.jpg">
                    <img src="appaye.jpg" alt="Appaye">
                    <div class="name">Aylambal Annasamy Chozhagar</div>
                </div>
                <ul>
                    <li>
                        <div class="member-card" data-name="Rajendran & Thangam" data-dob="DOB: 04/05/1968 & 11/10/1969" data-marr="Married: 12/06/1994" data-img="dadmom.jpg">
                            <img src="dadmom.jpg" alt="AppaAmma">
                            <div class="name">Rajendran & Thangam</div>
                        </div>
                        <ul>
                            <li>
                                <div class="member-card" data-name="Raghu & Anu" data-dob="DOB: 15/04/1995 & 16/02/1996" data-marr="Married: 08/09/2024" data-img="raghu.jpg">
                                    <img src="raghu.jpg" alt="raghu">
                                    <div class="name">Raghu & Anu</div>
                                </div>
                            </li>
                            <li>
                                <div class="member-card" data-name="Raja & Sanjia" data-dob="DOB: 11/01/1997 & 1997" data-marr="Married: 18/05/2025" data-img="raja.jpg">
                                    <img src="raja.jpg" alt="raja">
                                    <div class="name">Raja & Sanjeeya</div>
                                </div>
                            </li>
                        </ul>
                    </li>
                </ul>
            </li>
        </ul>
    </div>

    <!-- Modal Box -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <img id="modal-img" src="">
            <h3 id="modal-name-text"></h3>
            <p id="modal-dob-text"></p>
            <p id="modal-marr-text"></p>
        </div>
    </div>

    <script>
        const modal = document.getElementById("infoModal");
        const closeBtn = document.querySelector(".close-btn");

        document.querySelectorAll('.member-card').forEach(card => {
            card.addEventListener('click', function() {
                document.getElementById("modal-name-text").innerText = this.getAttribute("data-name");
                document.getElementById("modal-dob-text").innerText = this.getAttribute("data-dob");
                document.getElementById("modal-marr-text").innerText = this.getAttribute("data-marr");
                document.getElementById("modal-img").src = this.getAttribute("data-img");
                modal.style.display = "block";
            });
        });

        closeBtn.onclick = () => modal.style.display = "none";
        window.onclick = (event) => { if (event.target == modal) modal.style.display = "none"; }
    </script>

</body>
</html>
